[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."claude"]
  timeout = 26

[functions."auth"]
  timeout = 10

# Supabase anon key is publiek bedoeld (by design, geen admin rechten)
# Alleen ANTHROPIC_API_KEY is echt gevoelig en staat in environment variables
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_ANON"

[[headers]]
  for = "/.netlify/functions/claude"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
